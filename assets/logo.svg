<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Outer circle frame -->
  <circle cx="150" cy="150" r="138" stroke-width="3" fill="none"/>

  <!-- Central leaf (tallest) -->
  <path d="M 150 255 C 130 230, 122 190, 130 155 C 140 140, 160 140, 170 155 C 178 190, 170 230, 150 255 Z" stroke-width="2.5" fill="none"/>
  <circle cx="150" cy="175" r="3" fill="currentColor"/>
  <circle cx="150" cy="192" r="3" fill="currentColor"/>
  <circle cx="150" cy="209" r="3" fill="currentColor"/>
  <circle cx="150" cy="226" r="3" fill="currentColor"/>

  <!-- Left leaf (medium) -->
  <path d="M 100 255 C 85 235, 78 200, 87 172 C 98 158, 115 163, 120 180 C 120 210, 112 235, 100 255 Z" stroke-width="2.5" fill="none"/>
  <circle cx="101" cy="195" r="2.5" fill="currentColor"/>
  <circle cx="101" cy="212" r="2.5" fill="currentColor"/>
  <circle cx="101" cy="229" r="2.5" fill="currentColor"/>

  <!-- Right leaf (medium, mirrored) -->
  <path d="M 200 255 C 215 235, 222 200, 213 172 C 202 158, 185 163, 180 180 C 180 210, 188 235, 200 255 Z" stroke-width="2.5" fill="none"/>
  <circle cx="199" cy="195" r="2.5" fill="currentColor"/>
  <circle cx="199" cy="212" r="2.5" fill="currentColor"/>
  <circle cx="199" cy="229" r="2.5" fill="currentColor"/>

  <!-- Far left tiny leaf -->
  <path d="M 60 255 C 52 245, 48 228, 55 215 C 63 210, 72 218, 72 228 C 70 240, 66 250, 60 255 Z" stroke-width="2" fill="none"/>
  <circle cx="61" cy="232" r="2" fill="currentColor"/>

  <!-- Small water swirl on far left -->
  <path d="M 42 240 C 36 232, 42 224, 50 228 C 55 232, 50 238, 46 236" stroke-width="2" fill="none"/>

  <!-- Far right tiny leaf -->
  <path d="M 240 255 C 248 245, 252 228, 245 215 C 237 210, 228 218, 228 228 C 230 240, 234 250, 240 255 Z" stroke-width="2" fill="none"/>
  <circle cx="239" cy="232" r="2" fill="currentColor"/>

  <!-- Base wave lines (water base) -->
  <path d="M 30 268 Q 70 258, 110 268 T 190 268 T 270 268" stroke-width="1.8" fill="none" opacity="0.7"/>
  <path d="M 25 278 Q 65 270, 105 278 T 185 278 T 275 278" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
